- displayName: notification 2 minutes after current time
  id: notification-2-minutes-fr
  steps:
    - goal: connexion simple
      hint: |-
        utiliser le compte : "CompteTechnique-Testeur@stanworld.org"
        password : "Tester=2025"
      successCriteria: "Arrivée sur l'écran des journaux (ou le dernier journal actif)"
    
    - goal: Aller dans la gestion du journal
      hint: |-
        1. Ouvrir le menu burger (ou dropdown en haut).
        2. Cliquer sur "Gérer les journaux" (ou "Nouveau journal" si la liste est vide).
        3. S'assurer d'avoir un journal actif (le créer si besoin "Mon nouveau journal").
        4. Dans la liste ou sur la page d'accueil, cliquer sur l'icône de modification (crayon) du journal "Mon nouveau journal".
      successCriteria: "Arrivée sur la page 'Modifier le journal'"
    
    - goal: activer Notifications
      hint: "Activer le switch 'Activer les notifications' (Enable notifications)."
    
    - goal: 'ajouter une phrase de notifications : "test de notif de 2min"'
      hint: "Remplir le champ 'Phrase de notification'."
    
    - goal: Sélectionner les jours
      hint: "Cliquer sur le bouton 'Tout sélectionner' (SELECT ALL)."
    
    - goal: Ajouter une heure de notification
      hint: "Cliquer sur l'icône (+) pour ajouter un créneau. Le sélecteur d'heure s'ouvre automatiquement."
      successCriteria: "La pop-up de sélection d'heure s'affiche immédiatement avec l'heure actuelle pré-sélectionnée."
    
    - goal: Passer en mode saisie texte (Clavier)
      hint: "Cliquer sur l'icône de petit clavier située tout en bas à gauche de la fenêtre contextuelle (dialogue). C'est crucial pour la stabilité du test."
      successCriteria: "Les champs de saisie de texte (chiffres) remplacent l'horloge."

    - goal: Saisir l'heure (+2 minutes)
      hint: "Saisir l'heure actuelle + 2 minutes dans les champs, puis valider avec OK."
    
    - goal: sauvegarder les modifications
      hint: "Appuyer sur le bouton 'Enregistrer' (icône disquette) en haut à droite."
      successCriteria: "Retour au journal avec message 'Journal mis à jour' (ou similaire)."
    
    - goal: 'attendre la notification dans 2 minutes'
      hint: |-
        Ne pas fermer l'application (ou la mettre en arrière-plan).
        Attendre 2 minutes.
      successCriteria: "Une notification système apparaît avec le titre du journal et le texte 'test de notif de 2min'."
